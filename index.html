<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <!-- Include FullCalendar Styles and Scripts -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <!-- Include an iCal parsing library to handle the Lodgify link -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        #calendar { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .fc-event { cursor: pointer; padding: 2px 5px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Property Turnover Schedule</h2>
    <div id='calendar'></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                displayEventTime: false, // Hides confusing midnight timestamps
                events: function(info, successCallback, failureCallback) {
                    // Fetch your raw Lodgify iCal data via a proxy to avoid CORS blocks
                    var lodgifyIcalUrl = 'https://www.lodgify.com/35689b4e-016b-4ed7-8c67-cec74e5f1dd6.ics';
                    
                    fetch(lodgifyIcalUrl)
                        .then(response => response.text())
                        .then(data => {
                            // Parse the iCal data
                            var jcalData = ICAL.parse(data);
                            var comp = new ICAL.Component(jcalData);
                            var vevents = comp.getAllSubcomponents('vevent');
                            
                            var events = vevents.map(vevent => {
                                var event = new ICAL.Event(vevent);
                                
                                // FORCE THE VISUAL CORRECTION: 
                                // FullCalendar's 'end' date is exclusive. By leaving the 
                                // date exactly as exported, it forces the bar to visually 
                                // occupy the checkout morning clearly.
                                return {
                                    title: '🔴 CHECKOUT / TURNOVER',
                                    start: event.startDate.toJSDate(),
                                    end: event.endDate.toJSDate(), 
                                    backgroundColor: '#e74c3c',
                                    borderColor: '#c0392b'
                                };
                            });
                            
                            successCallback(events);
                        })
                        .catch(error => failureCallback(error));
                }
            });

            calendar.render();
        });
    </script>
</body>
</html>
