<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
    
              <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        #calendar { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 1. Base style for ALL booking bars */
        .fc-event { 
            cursor: pointer; 
            padding: 6px 0px; 
            font-size: 0.85em; 
            font-weight: bold; 
            background-color: #34495e !important; /* Default solid slate blue for middle stay days */
            border: none !important;
            color: #ffffff !important;
            text-align: center;
            border-radius: 0px !important; 
            margin-top: 4px;
            margin-bottom: 4px;
        }

        /* 2. TRUE ARRIVAL DAY: Left half transparent, right half pill-shaped blue */
        .fc-event-start:not(.fc-event-not-start) {
            background: linear-gradient(to right, transparent 50%, #34495e 50%) !important;
            border-top-left-radius: 50px !important;
            border-bottom-left-radius: 50px !important;
        }

        /* 3. TRUE CHECKOUT DAY: Left half pill-shaped blue, right half transparent */
        .fc-event-end:not(.fc-event-not-end) {
            background: linear-gradient(to right, #34495e 50%, transparent 50%) !important;
            border-top-right-radius: 50px !important;
            border-bottom-right-radius: 50px !important;
        }

        /* 4. SHORT STAY FIX: If a booking starts AND ends on the exact same single day,
           center a small isolated pill in the middle of the box */
        .fc-event-start:not(.fc-event-not-start).fc-event-end:not(.fc-event-not-end) {
            background: linear-gradient(to right, transparent 25%, #34495e 25%, #34495e 75%, transparent 75%) !important;
            border-radius: 50px !important;
        }

        /* 5. CONTINUATION ROWS: If a multi-week stay breaks lines, force it to be 
           perfectly flat, solid, and full-width on the split rows */
        .fc-event-not-start {
            background-color: #34495e !important;
            border-radius: 0px !important;
        }
        
        .fc-event-not-end {
            background-color: #34495e !important;
            border-radius: 0px !important;
        }

        /* Clean up internal wrapper constraints */
        .fc-daygrid-event-h-harness {
            border-radius: 0px !important;
            margin: 0 !important;
        }
    </style>


</head>
<body>

    <h2 style="text-align: center; color: #333;">Mid-Century Oasis with Pool</h2>
    <div id='calendar'></div>

           <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                displayEventTime: false, 
                events: function(info, successCallback, failureCallback) {
                    var rawUrl = 'https://www.lodgify.com/35689b4e-016b-4ed7-8c67-cec74e5f1dd6.ics'; 
                    var lodgifyIcalUrl = 'https://corsproxy.io/?' + encodeURIComponent(rawUrl);
                    
                    fetch(lodgifyIcalUrl)
                        .then(response => response.text())
                        .then(data => {
                            var jcalData = ICAL.parse(data);
                            var comp = new ICAL.Component(jcalData);
                            var vevents = comp.getAllSubcomponents('vevent');
                            
                            var events = vevents.map(vevent => {
                                var event = new ICAL.Event(vevent);
                                var startDate = event.startDate.toJSDate();
                                var endDate = event.endDate.toJSDate();
                                
                                // Keep our visual correction so the bar completely fills the checkout day
                                var visualEndDate = new Date(endDate);
                                visualEndDate.setDate(visualEndDate.getDate() + 1);
                                
                                return {
                                    title: '',
                                    start: startDate,
                                    end: visualEndDate
                                };
                            });
                            
                            successCallback(events);
                        })
                        .catch(error => {
                            console.error(error);
                            failureCallback(error);
                        });
                }
            });

            calendar.render();
        });
    </script>

</body>
</html>
