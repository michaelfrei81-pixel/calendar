<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
    
        <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        #calendar { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* UPDATED STYLES FOR ROUNDED CORNERS */
        .fc-event { 
            cursor: pointer; 
            padding: 6px 10px; 
            font-size: 0.95em; 
            font-weight: bold; 
            border-radius: 6px !important; /* This is the main control for rounding */
            border: none; /* Often looks cleaner without the border when rounding */
        }

        /* This specifically ensures the rounded corner appears at the *start* of the bar */
        .fc-daygrid-event-h-harness {
            border-radius: 6px !important;
        }
    </style>

</head>
<body>

    <h2 style="text-align: center; color: #333;">Property Turnover Schedule</h2>
    <div id='calendar'></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                displayEventTime: false, 
                events: function(info, successCallback, failureCallback) {
                    // Put your actual Lodgify URL here inside the single quotes:
                    var rawUrl = 'https://www.lodgify.com/35689b4e-016b-4ed7-8c67-cec74e5f1dd6.ics'; 
                    var lodgifyIcalUrl = 'https://corsproxy.io/?' + encodeURIComponent(rawUrl);
                    
                    fetch(lodgifyIcalUrl)
                        .then(response => response.text())
                        .then(data => {
                            var jcalData = ICAL.parse(data);
                            var comp = new ICAL.Component(jcalData);
                            var vevents = comp.getAllSubcomponents('vevent');
                            
                            var events = vevents.map(vevent => {
                                var event = new ICAL.Event(vevent);
                                
                                // Get the native javascript dates
                                var startDate = event.startDate.toJSDate();
                                var endDate = event.endDate.toJSDate();
                                
                                // FIX: Manually push the visual calendar end-date forward by 1 day
                                // This forces the bar to completely fill the checkout day grid box.
                                var visualEndDate = new Date(endDate);
                                visualEndDate.setDate(visualEndDate.getDate() + 1);
                                
                                return {
                                    title: '',
                                    start: startDate,
                                    end: visualEndDate, 
                                    backgroundColor: '#e000080', // Navy Blue for high visibility
                                    borderColor: '#c0392b',
                                    textColor: '#ffffff'
                                };
                            });
                            
                            successCallback(events);
                        })
                        .catch(error => {
                            console.error(error);
                            failureCallback(error);
                        });
                }
            });

            calendar.render();
        });
    </script>
</body>
</html>
