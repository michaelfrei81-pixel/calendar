<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
    
   <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        #calendar { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 1. Base style for ALL booking bars (Middle/Cut rows remain flat) */
        .fc-event { 
            cursor: pointer; 
            padding: 5px 0px; 
            font-size: 0.85em; 
            font-weight: bold; 
            background-color: #34495e !important; /* Elegant slate blue */
            border: none !important;
            color: #ffffff !important;
            text-align: center;
            
            /* Reset to flat edges for row breaks */
            border-radius: 0px !important; 
            margin-top: 4px;
            margin-bottom: 4px;
        }

        /* 2. Round the true START day left edge and pull it in slightly */
        .fc-event-start {
            border-top-left-radius: 20px !important;
            border-bottom-left-radius: 20px !important;
            margin-left: 10px !important; /* Subtle offset for check-in morning */
            padding-left: 4px;
        }

        /* 3. Round the true END day right edge and push it back slightly */
        .fc-event-end {
            border-top-right-radius: 20px !important;
            border-bottom-right-radius: 20px !important;
            margin-right: 10px !important; /* Subtle offset for checkout afternoon */
            padding-right: 4px;
        }

        /* Clean up FullCalendar's internal wrapper constraints */
        .fc-daygrid-event-h-harness {
            border-radius: 0px !important;
            margin: 0 !important;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #333;">Property Turnover Schedule</h2>
    <div id='calendar'></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                displayEventTime: false, 
                events: function(info, successCallback, failureCallback) {
                    // Put your actual Lodgify URL here inside the single quotes:
                    var rawUrl = 'https://www.lodgify.com/35689b4e-016b-4ed7-8c67-cec74e5f1dd6.ics'; 
                    var lodgifyIcalUrl = 'https://corsproxy.io/?' + encodeURIComponent(rawUrl);
                    
                    fetch(lodgifyIcalUrl)
                        .then(response => response.text())
                        .then(data => {
                            var jcalData = ICAL.parse(data);
                            var comp = new ICAL.Component(jcalData);
                            var vevents = comp.getAllSubcomponents('vevent');
                            
                            var events = vevents.map(vevent => {
                                var event = new ICAL.Event(vevent);
                                
                                // Clean timezone-locked date generation
                                var startYear = event.startDate.year;
                                var startMonth = event.startDate.month - 1; 
                                var startDay = event.startDate.day;
                                
                                var endYear = event.endDate.year;
                                var endMonth = event.endDate.month - 1;
                                var endDay = event.endDate.day;
                                
                                var startDate = new Date(startYear, startMonth, startDay);
                                var endDate = new Date(endYear, endMonth, endDay);
                                
                                // Visual correction so it highlights the entire checkout day
                                var visualEndDate = new Date(endDate);
                                visualEndDate.setDate(visualEndDate.getDate() + 1);
                                
                                return {
                                    title: '',
                                    start: startDate,
                                    end: visualEndDate
                                };
                            });
                            
                            successCallback(events);
                        })
                        .catch(error => {
                            console.error(error);
                            failureCallback(error);
                        });
                }
            });

            calendar.render();
        });
    </script>
</body>
</html>
