<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
    
                <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        #calendar { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .fc-event { 
            cursor: pointer; 
            padding: 4px 2px; 
            font-size: 0.9em; 
            font-weight: bold; 
            border-radius: 6px !important; 
            border: none;
        }

        .fc-daygrid-event-h-harness {
            border-radius: 6px !important;
        }
    </style>


</head>
<body>

    <h2 style="text-align: center; color: #333;">Property Turnover Schedule</h2>
    <div id='calendar'></div>

            <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                displayEventTime: false, 
                events: function(info, successCallback, failureCallback) {
                    var rawUrl = 'https://www.lodgify.com/35689b4e-016b-4ed7-8c67-cec74e5f1dd6.ics'; 
                    var lodgifyIcalUrl = 'https://corsproxy.io/?' + encodeURIComponent(rawUrl);
                    
                    fetch(lodgifyIcalUrl)
                        .then(response => response.text())
                        .then(data => {
                            var jcalData = ICAL.parse(data);
                            var comp = new ICAL.Component(jcalData);
                            var vevents = comp.getAllSubcomponents('vevent');
                            
                            var events = vevents.map(vevent => {
                                var event = new ICAL.Event(vevent);
                                
                                // Convert to pure local JS dates to avoid string formatting bugs
                                var startDate = event.startDate.toJSDate();
                                var endDate = event.endDate.toJSDate();
                                
                                // Keep our visual correction so the bar spans fully through checkout day
                                var visualEndDate = new Date(endDate);
                                visualEndDate.setDate(visualEndDate.getDate() + 1);
                                
                                return {
                                    start: startDate,
                                    end: visualEndDate, 
                                    backgroundColor: '#34495e', // Slate grey/blue for standard reservation days
                                    borderColor: '#2c3e50',
                                    textColor: '#ffffff',
                                    // Store local date strings for robust matching in the renderer
                                    extendedProps: {
                                        trueMatchStart: startDate.toDateString(),
                                        trueMatchEnd: endDate.toDateString()
                                    }
                                };
                            });
                            
                            successCallback(events);
                        })
                        .catch(error => {
                            console.error(error);
                            failureCallback(error);
                        });
                },
                
                // FIXED RENDERER: Uses reliable native date strings for matching
                eventContent: function(arg) {
                    var cellDateStr = arg.event.start.toDateString();
                    
                    var trueStart = arg.event.extendedProps.trueMatchStart;
                    var trueEnd = arg.event.extendedProps.trueMatchEnd;
                    
                    var container = document.createElement('div');
                    container.style.display = 'flex';
                    container.style.justifyContent = 'space-between';
                    container.style.alignItems = 'center';
                    container.style.width = '100%';
                    container.style.padding = '2px 4px';
                    
                    var labelText = document.createElement('span');
                    labelText.innerText = '🏨 OCCUPIED'; // Continuous stay label
                    labelText.style.fontSize = '0.85em';
                    container.appendChild(labelText);

                    // 1. Precise Check-In/Arrival Match
                    if (cellDateStr === trueStart) {
                        var inBadge = document.createElement('span');
                        inBadge.innerText = '🛫 ARRIVAL';
                        inBadge.style.backgroundColor = '#2ecc71'; // Vibrant Green
                        inBadge.style.padding = '2px 6px';
                        inBadge.style.borderRadius = '4px';
                        inBadge.style.fontSize = '0.8em';
                        labelText.innerText = ''; 
                        container.appendChild(inBadge);
                    } 
                    
                    // 2. Precise Check-Out/Turnover Match
                    if (cellDateStr === trueEnd) {
                        var outBadge = document.createElement('span');
                        outBadge.innerText = '🧹 CLEAN';
                        outBadge.style.backgroundColor = '#e74c3c'; // Vibrant Red
                        outBadge.style.padding = '2px 6px';
                        outBadge.style.borderRadius = '4px';
                        outBadge.style.fontSize = '0.8em';
                        labelText.innerText = ''; 
                        container.appendChild(outBadge);
                    }

                    return { domNodes: [container] };
                }
            });

            calendar.render();
        });
    </script>


</body>
</html>
