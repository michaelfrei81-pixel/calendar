<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
    
                <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        #calendar { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 1. Base style for ALL booking bars (The Middle/Cut sections) */
        .fc-event { 
            cursor: pointer; 
            padding: 6px 10px; 
            font-size: 0.95em; 
            font-weight: bold; 
            background-color: #34495e !important; /* Slate Blue for stay dates */
            border: none !important;
            color: #ffffff !important;
            
            /* Default to completely flat/straight edges for the "cut" sections */
            border-radius: 0px !important; 
            margin-top: 2px;
            margin-bottom: 2px;
        }

        /* 2. Style applied ONLY to the actual start day grid box */
        .fc-event-start {
            border-top-left-radius: 8px !important;
            border-bottom-left-radius: 8px !important;
            background-color: #2ecc71 !important; /* Green for arrival */
        }

        /* 3. Style applied ONLY to the actual checkout day grid box */
        .fc-event-end {
            border-top-right-radius: 8px !important;
            border-bottom-right-radius: 8px !important;
            background-color: #e74c3c !important; /* Red for turnover */
        }

        /* Clean up FullCalendar's internal wrapper constraints */
        .fc-daygrid-event-h-harness {
            border-radius: 0px !important;
        }
    </style>


</head>
<body>

    <h2 style="text-align: center; color: #333;">Mid-Century Oasis with Pool</h2>
    <div id='calendar'></div>

           <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                displayEventTime: false, 
                events: function(info, successCallback, failureCallback) {
                    var rawUrl = 'https://www.lodgify.com/35689b4e-016b-4ed7-8c67-cec74e5f1dd6.ics'; 
                    var lodgifyIcalUrl = 'https://corsproxy.io/?' + encodeURIComponent(rawUrl);
                    
                    fetch(lodgifyIcalUrl)
                        .then(response => response.text())
                        .then(data => {
                            var jcalData = ICAL.parse(data);
                            var comp = new ICAL.Component(jcalData);
                            var vevents = comp.getAllSubcomponents('vevent');
                            
                            var events = vevents.map(vevent => {
                                var event = new ICAL.Event(vevent);
                                var startDate = event.startDate.toJSDate();
                                var endDate = event.endDate.toJSDate();
                                
                                // Keep our visual correction so the bar completely fills the checkout day
                                var visualEndDate = new Date(endDate);
                                visualEndDate.setDate(visualEndDate.getDate() + 1);
                                
                                return {
                                    title: '',
                                    start: startDate,
                                    end: visualEndDate
                                };
                            });
                            
                            successCallback(events);
                        })
                        .catch(error => {
                            console.error(error);
                            failureCallback(error);
                        });
                }
            });

            calendar.render();
        });
    </script>

</body>
</html>
